<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bookings — Jazz Events Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
  <link rel="stylesheet" href="../register/register.css">
  <link rel="stylesheet" href="dashboard.css">
  <link rel="stylesheet" href="bookings.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="dash-layout">
    <aside class="sidebar" id="sidebar">
      <!-- sidebar content same as dashboard.html -->
      <div class="sidebar-brand">
        <a href="../home.html" style="text-decoration:none;">
          <div class="brand-script">Jazz Events</div>
        </a>
        <div class="brand-sub">Admin Panel</div>
      </div>
      <nav class="sidebar-nav">
        <a class="nav-item" href="dashboard.html"><i class="fa-solid fa-grip"></i> Dashboard</a>
        <a class="nav-item active" href="bookings.html"><i class="fa-solid fa-clipboard-list"></i> Bookings</a>
        <a class="nav-item" href="events.html"><i class="fa-regular fa-calendar"></i> Events</a>
        <a class="nav-item" href="clients.html"><i class="fa-solid fa-users"></i> Clients</a>
        <a class="nav-item" href="analytics.html"><i class="fa-solid fa-chart-line"></i> Analytics</a>
        <a class="nav-item" href="payments.html"><i class="fa-regular fa-credit-card"></i> Payments</a>
      </nav>
      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="sidebar-avatar" id="sidebar-avatar"><span class="profile-avatar-initials" id="profile-avatar-initials"><i class="fa-regular fa-user"></i></span></div>
          <div class="sidebar-user-info">
            <div class="u-name" id="sidebar-name">Edrian Albero</div>
            <div class="u-role" id="sidebar-role">Event Organizer</div>
          </div>
          <button class="sidebar-logout" title="Log out" onclick="DB.logout();"><i class="fa-solid fa-arrow-right-from-bracket"></i></button>
        </div>
      </div>
    </aside>

    <main class="dash-main">
      <div class="dash-topbar">
        <div class="topbar-left">
          <div class="topbar-heading">Bookings</div>
          <div class="topbar-divider"></div>
          <div class="topbar-sub" id="topbar-greeting">Manage bookings</div>
        </div>
        <div class="topbar-right">
          <div class="dash-search-wrap">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" placeholder="Search clients, email..." id="booking-search-input" aria-label="Search bookings">
          </div>

        </div>
      </div>

      <div class="dash-content">
        <!-- Stats Bar -->
        <div class="stats-grid" id="booking-stats"></div>

        <!-- Filters -->
        <div class="filters-bar">
          <select id="status-filter" class="field-input" style="max-width:180px;" aria-label="Filter by status">
            <option value="">All Statuses</option>
            <option value="PENDING">Pending</option>
            <option value="CONFIRMED">Confirmed</option>
            <option value="COMPLETED">Completed</option>
            <option value="CANCELLED">Cancelled</option>
          </select>
        </div>

        <!-- Bookings Table -->
        <table class="events-table" id="bookings-table">
          <thead>
            <tr>
              <th>Client Name</th>
              <th>Email</th>
              <th>Event Date</th>
              <th>Event Type</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="bookings-tbody"></tbody>
        </table>
        <div class="table-footer" id="bookings-footer">
          <span id="bookings-count"></span>
          <div class="pagination" id="bookings-pagination"></div>
        </div>
      </div>
    </main>
  </div>

  <!-- Modals -->
  <div class="modal-overlay" id="modal-view-booking" role="dialog" aria-modal="true">
    <div class="modal-box">
      <div class="modal-title">
        <span id="view-booking-title">Booking Details</span>
        <button class="modal-close" onclick="closeModal('modal-view-booking')"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div id="view-booking-content" style="padding:12px 0; font-size:0.85rem; color:var(--text-gray);"></div>
      <div class="modal-footer">
        <button class="btn-ghost" onclick="closeModal('modal-view-booking')">Close</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="modal-new-booking" role="dialog" aria-modal="true">
    <div class="modal-box">
      <div class="modal-title">
        <span id="new-booking-modal-title">New Booking</span>
        <button class="modal-close" onclick="closeModal('modal-new-booking')"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <input type="hidden" id="booking-edit-id">
      <div class="form-grid-2">
        <div class="field-group">
          <label class="field-label">Client Name <span class="req">*</span></label>
          <input class="field-input" id="bk-client-name" placeholder="e.g. Maria">
          <div class="error-msg" id="bk-client-name-err"></div>
        </div>
        <div class="field-group">
          <label class="field-label">Client Email <span class="req">*</span></label>
          <input class="field-input" id="bk-client-email" placeholder="e.g. maria@example.com" type="email">
          <div class="error-msg" id="bk-client-email-err"></div>
        </div>
        <div class="field-group">
          <label class="field-label">Event Type</label>
          <input class="field-input" id="bk-event-type" placeholder="e.g. Wedding">
        </div>
        <div class="field-group">
          <label class="field-label">Event Date <span class="req">*</span></label>
          <input class="field-input" id="bk-event-date" type="date">
          <div class="error-msg" id="bk-event-date-err"></div>
        </div>
        <div class="field-group">
          <label class="field-label">Venue</label>
          <input class="field-input" id="bk-venue" placeholder="e.g. Shang-ri La">
        </div>
        <div class="field-group">
          <label class="field-label">Estimated Budget</label>
          <input class="field-input" id="bk-budget" type="number" placeholder="e.g. 250000">
        </div>
        <div class="field-group" style="grid-column:1 / -1;">
          <label class="field-label">Notes</label>
          <textarea class="field-input" id="bk-notes" rows="3" placeholder="Additional details"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-ghost" onclick="closeModal('modal-new-booking')">Cancel</button>
        <button class="btn-gold" onclick="saveBooking()"><i class="fa-solid fa-floppy-disk"></i> Save Booking</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="modal-cancel-booking" role="dialog" aria-modal="true">
    <div class="modal-box" style="max-width:400px;">
      <div class="modal-title">Cancel Booking</div>
      <p style="font-size:0.85rem; color:var(--text-gray); margin-bottom:8px;" id="cancel-confirm-msg">Are you sure you want to cancel this booking?</p>
      <div class="field-group">
        <label class="field-label">Reason (optional)</label>
        <input class="field-input" id="cancel-reason" placeholder="Reason for cancellation">
      </div>
      <div class="modal-footer">
        <button class="btn-ghost" onclick="closeModal('modal-cancel-booking')">Close</button>
        <button class="btn-danger" id="confirm-cancel-btn">Cancel Booking</button>
      </div>
    </div>
  </div>

  <script src="../scripts/db.js"></script>
  <script src="dashboard_ui.js"></script>
  <script src="useBookings.js"></script>
  <script src="bookings.js"></script>
</body>
</html>
