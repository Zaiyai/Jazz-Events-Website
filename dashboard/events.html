<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Events — Jazz Events Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
  <link rel="stylesheet" href="../register/register.css">
  <link rel="stylesheet" href="dashboard.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="background: #111;">

<div class="dash-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <a href="../home.html" style="text-decoration:none;">
        <div class="brand-script">Jazz Events</div>
      </a>
      <div class="brand-sub">Admin Panel</div>
    </div>

    <nav class="sidebar-nav">
      <a class="nav-item" href="dashboard.html"><i class="fa-solid fa-grip"></i> Dashboard</a>
      <a class="nav-item" href="bookings.html"><i class="fa-solid fa-clipboard-list"></i> Bookings</a>
      <a class="nav-item active" href="events.html"><i class="fa-regular fa-calendar"></i> Events</a>
      <a class="nav-item" href="clients.html"><i class="fa-solid fa-users"></i> Clients</a>
      <a class="nav-item" href="analytics.html"><i class="fa-solid fa-chart-line"></i> Analytics</a>
      <a class="nav-item" href="payments.html"><i class="fa-regular fa-credit-card"></i> Payments</a>
    </nav>

    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-avatar" id="sidebar-avatar"><span class="profile-avatar-initials" id="profile-avatar-initials"><i class="fa-regular fa-user"></i></span></div>
        <div class="sidebar-user-info">
          <div class="u-name" id="sidebar-name">Edrian Albero</div>
          <div class="u-role" id="sidebar-role">Event Organizer</div>
        </div>
        <button class="sidebar-logout" title="Log out" onclick="DB.logout();">
          <i class="fa-solid fa-arrow-right-from-bracket"></i>
        </button>
      </div>
    </div>
  </aside>

  <!-- Main Content without Sidebar -->
  <main class="dash-main">
    <div class="dash-topbar">
      <div class="topbar-left">
        <div class="topbar-heading">Events</div>
        <div class="topbar-divider"></div>
        <div class="topbar-sub">Manage your events</div>
      </div>
      <div class="topbar-right">
        <div class="topbar-filters">
          <span class="active">All Events</span>
          <span>Corporate</span>
          <span>Wedding</span>
          <span>Private</span>
          <span>Gala</span>
        </div>
        <button class="btn-outline">
          <i class="fa-solid fa-filter"></i> Filter
        </button>
        <button class="btn-outline" style="margin-right: 12px;">
          <i class="fa-solid fa-upload"></i> Export
        </button>
        <button class="btn-gold" style="padding: 10px 20px; font-size: 0.85rem;" onclick="window.location.href='dashboard.html'">
          <i class="fa-solid fa-plus"></i> New Event
        </button>
      </div>
    </div>

    <!-- Content -->
    <div class="dash-content">
      
      <!-- Stats -->
      <div class="stats-grid">
        <div class="page-stat-card">
          <div class="page-stat-label">TOTAL EVENTS</div>
          <div class="page-stat-icon"><i class="fa-regular fa-calendar"></i></div>
          <div class="page-stat-value" id="stat-total-events">0</div>
          <div class="page-stat-sub up"><i class="fa-solid fa-arrow-up"></i> <span id="stat-events-month">0</span> this month</div>
        </div>
        <div class="page-stat-card">
          <div class="page-stat-label">UPCOMING</div>
          <div class="page-stat-icon"><i class="fa-regular fa-calendar-check"></i></div>
          <div class="page-stat-value" id="stat-upcoming-events">0</div>
          <div class="page-stat-sub">Next 30 days</div>
        </div>
        <div class="page-stat-card">
          <div class="page-stat-label">IN PROGRESS</div>
          <div class="page-stat-icon"><i class="fa-solid fa-sun"></i></div>
          <div class="page-stat-value" id="stat-ongoing-events">0</div>
          <div class="page-stat-sub warn">Requires attention</div>
        </div>
        <div class="page-stat-card">
          <div class="page-stat-label">COMPLETED</div>
          <div class="page-stat-icon"><i class="fa-regular fa-circle-check"></i></div>
          <div class="page-stat-value" id="stat-completed-events">0</div>
          <div class="page-stat-sub up" id="stat-completion-rate">98.5% satisfaction</div>
        </div>
      </div>

      <!-- Events Grid -->
      <div id="events-grid" class="events-grid">
        <!-- Populated dynamically by renderEventsGrid() -->
      </div>
    </div>
  </main>
</div>

<div id="toast" class="toast"></div>

<script src="../scripts/db.js"></script>
<script src="dashboard_ui.js"></script>
<script src="dashboard.js"></script>
<script>
// Initialize events page
document.addEventListener('DOMContentLoaded', async () => {
  const user = await DB.getUser();
  if (!user) window.location.href = '../home.html';
  
  // Populate sidebar user info
  var words = user.name.trim().split(/\s+/);
  var initials = words.map(function(w){ return w[0]; }).join('').toUpperCase().substring(0,2);
  const pfp = document.getElementById('profile-avatar-initials');
  document.getElementById('sidebar-name').textContent = user.name;
  if (user.profile_picture) {
    pfp.innerHTML = '<img src="' + prefix + user.profile_picture + '" style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover;">';
    document.getElementById('sidebar-avatar').innerHTML = '<img src="' + prefix + user.profile_picture + '" style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover;">';
  } else {
    pfp.textContent = initials;
    document.getElementById('sidebar-avatar').textContent = initials;
  }
  
  // Render events grid and update stats
  await renderEventsGrid();
  await updateEventStats();
});
</script>

</body>
</html>
