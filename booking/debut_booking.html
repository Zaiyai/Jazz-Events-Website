<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debut Booking</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="booking.css">

    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;500;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navigation Header -->
    <header>
        <div class="nav-container">
            <!-- Mobile Menu Button -->
            <button class="mobile-btn">
                <i class="fa-solid fa-bars"></i>
            </button>

            <!-- Navigation Links -->
            <nav class="nav-links">
                <a href="../index.html">Home</a>
                <a href="#">Gallery</a>
                <a href="../index.html">Services</a>
                <a href="#">Reviews</a>
                <a href="#about">About Us</a>
                <a href="#">Contact</a>
            </nav>
        </div>
    </header>

    <section id="banner-section" class="hero">
        <div class="hero-bg">
            <img src="../images/img1.jpg" alt="Event Catering Buffet">
            <div class="hero-overlay"></div>
        </div>

        <div class="container">
            <form>
                <div class="services-header">
                    <div class="flourish">
                        <img class="gold_accent" src="../images/gold_accent.png">
                    </div>
                        
                    <h2 class="section-title text-center" style="margin: 0;">Debut <span class="text-gold">Booking</span></h2>

                    <div class="flourish flourish-right">
                        <img class="gold_accent" src="../images/gold_accent.png">
                    </div>
                </div>
        
                <label for="name">Full Name of Celebrant:</label>
                <input type="text" name="name"/>
                
                <label for="date">Date:</label>
                <input type="date" name="date"/><br><br><br>
                
                <h3 class="text-center">Where can we <span class="text-gold">contact</span> you?</h3> <br>
                <label for="phone-number">Phone Number:</label>
                <input type="tel" name="phone-number"/>
                <label for="facebook-link">Facebook Link:</label>
                <input type="text" name="facebook-link"/> <br><br>
        
                <label for="specifics"><h3>Write us a message:</h3></label><br>
                <textarea name="specifics" style="width: 30vw; height: 20vh"></textarea><br><br>
                
                <button class="btn-gold" type="submit">
                    <span>Submit</span>
                </button>
            </form>
        </div>
    </section>
</body>
</html>
