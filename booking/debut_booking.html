<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Booking</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="booking.css">

    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;500;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navigation Header -->
    <header>
        <div class="nav-container">
            <!-- Mobile Menu Button -->
            <button class="mobile-btn">
                <i class="fa-solid fa-bars"></i>
            </button>

            <!-- Navigation Links -->
            <nav class="nav-links">
                <a href="../index.html">Home</a>
                <a href="#">Gallery</a>
                <a href="../index.html">Services</a>
                <a href="#">Reviews</a>
                <a href="#about">About Us</a>
                <a href="#">Contact</a>
            </nav>
        </div>
    </header>

    <section id="banner-section" class="hero">
        <div class="hero-bg">
            <img src="../images/img1.jpg" alt="Event Catering Buffet">
            <div class="hero-overlay"></div>
        </div>

        <div class="container">
            <form>
                <div class="services-header">
                    <div class="flourish">
                        <img class="gold_accent" src="../images/gold_accent.png">
                    </div>
                        
                    <h2 class="section-title text-center" style="margin: 0;">Event <span class="text-gold">Booking</span></h2>

                    <div class="flourish flourish-right">
                        <img class="gold_accent" src="../images/gold_accent.png">
                    </div>
                </div>
                
                <h3>Event <span class="text-gold">Details:</span></h3> <br>
                <div class="form-row">
                    <div class="form-group">
                        <label for="event">Type of Event:</label>
                        <input type="text" placeholder="e.g. Wedding Reception" name="event"/>

                    <div class="form-group">
                        <label for="name">Full Name of Celebrant:</label>
                        <input type="text" placeholder="e.g. Dela Cruz, Maria B." name="name"/>
                    </div>

                    <div class="form-group">
                        <label for="date">Date:</label>
                        <input type="date" name="date"/>
                    </div>

                    <div class="form-group">
                        <label for="attendees">Number of Guests/Attendees:</label>
                        <input type="number" placeholder="5-100" name="atendees"/>
                    </div>
                </div>

                
                <div class="line"></div><br>
                
                <h3>Where can we <span class="text-gold">contact you?</span></h3><br>
                <div class="form-row">
                    <label for="phone-number">Phone Number:</label>
                    <input type="tel" placeholder="09##-###-####" name="phone-number"/>
                    <label for="facebook-link">Facebook Link:</label>
                    <input type="text" placeholder="https://www.facebook.com/profile.php?id=#####" name="facebook-link"/> <br><br>
                    <label for="email">Email Address:</label>
                    <input type="text" placeholder="e.g mariadelacruz123@domain.com" name="email-address"/> <br><br>
                </div>

                <div class="line"></div><br>
        
                <label for="specifics"><h3>Write us a message:</h3></label><br>
                <textarea name="specifics"></textarea><br><br>
                
                <button class="btn-gold" type="submit">
                    <span>Submit</span>
                </button>
            </form>
        </div>
    </section>
</body>
</html>
