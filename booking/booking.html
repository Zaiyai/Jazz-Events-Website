<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Booking - Jazz Events</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="booking.css">
    
</head>
<body>
    <header>
        <div class="nav-container">
            <button id="burger" class="mobile-btn">
                <i class="fa-solid fa-bars"></i>
            </button>

            <nav class="nav-links desktop-nav">
                <a href="../home.html">Home</a>
                <a href="../home.html#services-section">Services</a>
                <a href="../home.html#team-section">Team</a>
                <a href="../home.html#reviews-section">Reviews</a>
                <a href="../home.html#about">About Us</a>
                <a href="../home.html#cta-section">Contact</a>
            </nav>
        </div>
    </header>

    <div id="nav-overlay" class="nav-overlay mobile-only">
        <button id="close-overlay" class="close-btn">✕</button>
        <nav class="nav-links overlay-links">
            <a href="../home.html">Home</a>
            <a href="../home.html#services-section">Services</a>
            <a href="../home.html#team-section">Team</a>
            <a href="../home.html#reviews-section">Reviews</a>
            <a href="../home.html#about">About Us</a>
            <a href="../home.html#cta-section">Contact</a>
        </nav>
    </div>

    <section id="banner-section" class="hero">
        <div class="hero-bg">
            <img src="../images/img1.jpg" alt="Event Booking">
            <div class="hero-overlay"></div>
        </div>

        <div class="hero-content">
            <form class="form-container" action="#" method="POST">
                <div class="services-header">
                    <div class="flourish">
                        <img class="gold_accent" src="../images/gold_accent.png" alt="">
                    </div>
                    
                    <h2 class="section-title text-center">Event <span class="text-gold">Booking</span></h2>

                    <div class="flourish flourish-right">
                        <img class="gold_accent" src="../images/gold_accent.png" alt="">
                    </div>
                </div>
                
                <h3 class="section-subtitle">Your Event <span class="text-gold">Details</span></h3>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="event">Type of Event <span class="text-red">*</span></label>
                        <input type="text" id="event" name="event" placeholder="e.g. Wedding Reception" required>
                    </div>

                    <div class="form-group">
                        <label for="name">Full Name of Celebrant/s <span class="text-red">*</span></label>
                        <input type="text" id="name" name="name" placeholder="e.g. Dela Cruz, Maria B." required>
                    </div>

                    <div class="form-group">
                        <label for="date">Event Date From <span class="text-red">*</span></label>
                        <input type="date" id="date" name="date" required>
                    </div>

                    <div class="form-group">
                        <label for="date">Event Date To <span class="text-red">*</span></label>
                        <input type="date" id="date" name="date" required>
                    </div>

                    <div class="form-group">
                        <label for="attendees">Estimated Number of Guests <span class="text-red">*</span></label>
                        <input type="number" id="attendees" name="attendees" placeholder="e.g. 100" min="1" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="name">Venue Location <span class="text-red">*</span></label>
                        <input type="text" id="name" name="name" placeholder="e.g. Imus, Cavite or Specific Venue Name" required>
                    </div>
                </div>
                
                <div class="form-row full-width">
                    <div class="form-group">
                        <label for="theme">Event Theme <span class="text-red">*</span></label>
                        <input name="theme" id="theme" type="text" placeholder="e.g. Barbie Theme">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group full-width">
                        <label>Services Needed (Check all that apply) <span class="text-red">*</span></label>
                        <div class="checkbox-group">
                            <label class="checkbox-item">
                                <input type="checkbox" name="service" value="catering">
                                <span>Full Catering</span>
                            </label>
                            <label class="checkbox-item">
                                <input type="checkbox" name="service" value="styling">
                                <span>Event Styling / Decor</span>
                            </label>
                            <label class="checkbox-item">
                                <input type="checkbox" name="service" value="lights-sounds">
                                <span>Lights & Sounds</span>
                            </label>
                            <label class="checkbox-item">
                                <input type="checkbox" name="service" value="photo-video">
                                <span>Photo & Video</span>
                            </label>
                            <label class="checkbox-item">
                                <input type="checkbox" name="service" value="coordination">
                                <span>Guidance & Coordination</span>
                            </label>
                        </div>
                    </div>
                </div>



                <div class="line"></div>
                
                <h3 class="section-subtitle">Where Can We <span class="text-gold">Contact You?</span></h3>

                <div class="form-row">
                    <div class="form-group">
                        <label for="phone-number">Phone Number <span class="text-red">*</span></label>
                        <input type="tel" id="phone-number" name="phone-number" placeholder="09##-###-####" required>
                    </div>

                    <div class="form-group">
                        <label for="facebook-link">Facebook Link <span class="text-red">*</span></label>
                        <input type="url" id="facebook-link" name="facebook-link" placeholder="https://www.facebook.com/..." required>
                    </div>
                </div>

                <div class="form-row" style="display: flex; justify-content: center;">
                    <div class="form-group">
                        <label for="email">Email Address <span class="optional">(optional)</span></label>
                        <input type="email" id="email" name="email" placeholder="e.g. maria@domain.com">
                    </div>
                </div>

                <div class="line"></div>
        
                <h3 class="section-subtitle">Personal <span class="text-gold">Requests</span></h3>
                <textarea id="message" name="message" placeholder="Tell us about your vision for this event..."></textarea>
                
                <button class="btn-gold" type="submit">
                    <span>Submit Booking</span>
                    <i class="fa-solid fa-arrow-right"></i>
                </button>
            </form>
        </div>
    </section>

    <script src="../scripts/main.js"></script>
</body>
</html>
