<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;500;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="booking.css">
    
</head>
<body>
    <header>
        <div class="nav-container">
            <button id="burger" class="mobile-btn">
                <i class="fa-solid fa-bars"></i>
            </button>

            <nav class="nav-links desktop-nav">
                <a href="../home.html">Home</a>
                <a href="../home.html#services-section">Services</a>
                <a href="../home.html#team-section">Team</a>
                <a href="../home.html#reviews-section">Reviews</a>
                <a href="../home.html#about">About Us</a>
                <a href="../home.html#cta-section">Contact</a>
            </nav>
        </div>
    </header>

    <div id="nav-overlay" class="nav-overlay mobile-only">
        <button id="close-overlay" class="close-btn">✕</button>
        <nav class="nav-links overlay-links">
            <a href="../home.html">Home</a>
            <a href="../home.html#services-section">Services</a>
            <a href="../home.html#team-section">Team</a>
            <a href="../home.html#reviews-section">Reviews</a>
            <a href="../home.html#about">About Us</a>
            <a href="../home.html#cta-section">Contact</a>
        </nav>
    </div>

    <section id="banner-section" class="hero">
        <div class="hero-bg">
            <img src="../images/img1.jpg" alt="Event Booking">
            <div class="hero-overlay"></div>
        </div>

        <div class="hero-content">
            <form class="form-container" action="booking_registry.php" method="post">
                <div class="services-header">
                    <div class="flourish">
                        <img class="gold_accent" src="../images/gold_accent.png" alt="">
                    </div>
                    
                    <h2 class="section-title text-center">Event <span class="text-gold">Booking</span></h2>

                    <div class="flourish flourish-right">
                        <img class="gold_accent" src="../images/gold_accent.png" alt="">
                    </div>
                </div>
                
                <h3 class="section-subtitle">Your Event <span class="text-gold">Details</span></h3>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="event">Type of Event <span class="text-red">*</span></label>
                        <input type="text" id="event" name="type" placeholder="e.g. Wedding Reception" required>
                    </div>

                    <div class="form-group">
                        <label for="celebrant_name">Full Name of Celebrant/s <span class="text-red">*</span></label>
                        <input type="text" id="name" name="celebrant_name" placeholder="e.g. Dela Cruz, Maria B." required>
                    </div>

                    <div class="form-group">
                        <label for="event_date_from">Event Date From <span class="text-red">*</span></label>
                        <input type="date" id="date" name="event_date_from" required>
                    </div>

                    <div class="form-group">
                        <label for="event_date_to">Event Date To <span class="text-red">*</span></label>
                        <input type="date" id="date" name="event_date_to" required>
                    </div>

                    <div class="form-group">
                        <label for="no_of_guests">Estimated Number of Guests <span class="text-red">*</span></label>
                        <input type="number" id="attendees" name="no_of_guests" placeholder="e.g. 100" min="1" max="10000" required onchange="updateEstimatedBudget()">
                    </div>
                    
                    <div class="form-group">
                        <label for="venue">Venue Location <span class="text-red">*</span></label>
                        <input type="text" id="name" name="venue" placeholder="e.g. Imus, Cavite or Specific Venue Name" required>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group full-width">
                        <label for="theme">Event Themed <span class="text-red">*</span></label>
                        <input name="theme" id="theme" type="text" placeholder="e.g. Barbie Theme">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group full-width">
                        <label>Services Needed (Check all that apply) <span class="text-red">*</span></label>
                        <div class="checkbox-group" onclick="updateEstimatedBudget()">
                            <label class="checkbox-item">
                                <input type="checkbox" name="service" value="catering">
                                <div class="service">
                                    <span>Full Catering</span>
                                    <p class="service-detail">Food & Beverage</p>
                                </div>
                            </label>
                            <label class="checkbox-item">
                                <input type="checkbox" name="service" value="styling">
                                <div class="service">
                                    <span>Event Styling</span>
                                    <p class="service-detail">Concept & Layout Design</p>
                                </div>
                            </label>
                            <label class="checkbox-item">
                                <input type="checkbox" name="service" value="decoration">
                                <div class="service">
                                    <span>Decoration</span>
                                    <p class="service-detail">Floral, Table & Venue Decor</p>
                                </div>
                            </label>
                            <label class="checkbox-item">
                                <input type="checkbox" name="service" value="lights">
                                <div class="service">
                                    <span>Lights</span>
                                    <p class="service-detail">Ambient & Stage Lighting</p>
                                </div>
                            </label>
                            <label class="checkbox-item">
                                <input type="checkbox" name="service" value="sounds">
                                <div class="service">
                                    <span>Sounds</span>
                                    <p class="service-detail">PA System & Audio Setup</p>
                                </div>
                            </label>
                            <label class="checkbox-item">
                                <input type="checkbox" name="service" value="photography">
                                <div class="service">
                                    <span>Photography</span>
                                    <p class="service-detail">Professional Photo Coverage</p>
                                </div>
                            </label>
                            <label class="checkbox-item">
                                <input type="checkbox" name="service" value="videography">
                                <div class="service">
                                    <span>Videography</span>
                                    <p class="service-detail">Full Video Production</p>
                                </div>
                            </label>
                            <label class="checkbox-item">
                                <input type="checkbox" name="service" value="coordination">
                                <div class="service">
                                    <span>Guidance & Coordination</span>
                                    <p class="service-detail">Day-of Event Coordination</p>
                                </div>
                            </label>
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group full-width">
                        <label for="event-budget">Estimated Event Budget</label>
                        <div class="budget-input-container">
                            <p class="currency-symbol">₱</p>
                            <div class="divider"></div>
                            <p id="event-budget"></p>
                        </div>
                    </div>
                </div>

                <div class="additional-detail">
                    <p>*Tentative budget bracket based on number of guests and services applied for</p>
                </div>

                <div class="line"></div>

                <div class="form-row">
                    <div class="form-group full-width">
                        <label for="email">Email Address <span class="text-red">*</span></label>
                        <input type="email" id="email" name="email" placeholder="e.g. maria@domain.com">
                    </div>
                </div>

                <div class="additional-detail">
                    <p>(We will send a copy of your event details through this email)</p>
                </div>
                
                <br><br>

                <h3 class="section-subtitle">Personal <span class="text-gold">Requests</span></h3>
                <textarea id="message" name="message" placeholder="Tell us about your vision for this event..."></textarea>
                
                <button class="btn-gold" type="submit">
                    <span>Submit Booking</span>
                    <i class="fa-solid fa-arrow-right"></i>
                </button>
            </form>
        </div>
    </section>

    <script src="../scripts/main.js"></script>
    <script src="booking.js"></script>
</body>
</html>
