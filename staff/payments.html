<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payments — Jazz Events Staff</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
  <link rel="stylesheet" href="../register/register.css">
  <link rel="stylesheet" href="../dashboard/dashboard.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="background: #111;">

<div class="dash-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <a href="../home.html" style="text-decoration:none;">
        <div class="brand-script">Jazz Events</div>
      </a>
      <div class="brand-sub">Staff Panel</div>
    </div>

    <nav class="sidebar-nav">
      <a class="nav-item" href="dashboard.html"><i class="fa-solid fa-grip"></i> Dashboard</a>
      <a class="nav-item" href="bookings.html"><i class="fa-solid fa-clipboard-list"></i> Bookings</a>
      <a class="nav-item" href="events.html"><i class="fa-regular fa-calendar"></i> Events</a>
      <a class="nav-item active" href="payments.html"><i class="fa-regular fa-credit-card"></i> Payments</a>
    </nav>

    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-avatar" id="sidebar-avatar">EA</div>
        <div class="sidebar-user-info">
          <div class="u-name" id="sidebar-name">Edrian Albero</div>
          <div class="u-role" id="sidebar-role">Event Organizer</div>
        </div>
        <button class="sidebar-logout" title="Log out" onclick="DB.logout();">
          <i class="fa-solid fa-arrow-right-from-bracket"></i>
        </button>
      </div>
    </div>
  </aside>

  <main class="dash-main">
    <div class="dash-topbar">
      <div class="topbar-left">
        <div class="topbar-heading">Payments</div>
        <div class="topbar-divider"></div>
        <div class="topbar-sub">Track transactions & invoices</div>
      </div>
      <div class="topbar-right">
        <button class="btn-gold" style="padding: 10px 20px; font-size: 0.85rem;">
          <i class="fa-solid fa-plus"></i> Record Payment
        </button>
      </div>
    </div>

    <!-- Content -->
    <div class="dash-content">
      
      <!-- Stats -->
      <!-- Financial stats removed -->

      <!-- Recent Transaction -->
      <div class="table-card" style="margin-top: 24px;">
        <div class="table-header" style="padding: 24px;">
          <h3 style="font-size: 1.2rem; color: var(--text-white);">Recent Transactions</h3>
        </div>
        <table class="events-table">
          <thead>
            <tr>
              <th style="padding-left: 24px;">INVOICE</th>
              <th>CLIENT</th>
              <th>EVENT</th>
              <th>AMOUNT</th>
              <th>DATE</th>
              <th>STATUS</th>
            </tr>
          </thead>
          <tbody id="payments-tbody">
            <tr id="payments-loading">
              <td colspan="6" style="text-align:center; padding:32px; color:var(--text-gray);">
                Loading payments…
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<div id="toast" class="toast"></div>

<script src="../scripts/db.js"></script>
<script src="../dashboard/dashboard_ui.js"></script>
<script src="../dashboard/dashboard.js"></script>

<script>
(async function loadPayments() {
  const tbody = document.getElementById('payments-tbody');

  try {
    const payments = await DB.getPayments();

    if (!payments || payments.length === 0) {
      tbody.innerHTML = `
        <tr>
          <td colspan="6" style="text-align:center; padding:32px; color:var(--text-gray);">
            No payments found.
          </td>
        </tr>`;
      return;
    }

    tbody.innerHTML = payments.map(p => {
      // Format amount as ₱ with commas
      const amount = Number(p.amount).toLocaleString('en-PH', {
        minimumFractionDigits: 0,
        maximumFractionDigits: 2
      });

      // Format date
      const dateStr = p.payment_date
        ? new Date(p.payment_date).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
        : '—';

      // Status pill class
      const statusMap = {
        'PAID':     'outline-green',
        'PENDING':  'outline-yellow',
        'OVERDUE':  'outline-red',
        'REFUNDED': 'outline-blue',
        'PARTIAL':  'outline-yellow'
      };
      const pillClass = statusMap[p.payment_status] || 'outline-yellow';
      const statusLabel = p.payment_status.charAt(0) + p.payment_status.slice(1).toLowerCase();

      // Client initials fallback
      const initials = p.client_initials
        || p.client_name.split(',')[0].trim().charAt(0).toUpperCase();

      return `
        <tr>
          <td style="color: var(--jazz-gold); padding-left: 24px;">${p.invoice_number}</td>
          <td>
            <div class="client-cell">
              <div class="client-mini-avatar">${initials}</div>
              <span style="font-weight: 600; color: var(--text-white);">${p.client_name}</span>
            </div>
          </td>
          <td style="color: var(--text-gray);">${p.event_name}</td>
          <td style="color: var(--text-white);">₱ ${amount}</td>
          <td style="color: var(--text-gray);">${dateStr}</td>
          <td><span class="status-pill ${pillClass}">${statusLabel}</span></td>
        </tr>`;
    }).join('');

  } catch (err) {
    console.error('Failed to load payments:', err);
    tbody.innerHTML = `
      <tr>
        <td colspan="6" style="text-align:center; padding:32px; color:#f87171;">
          Failed to load payments. Please try again.
        </td>
      </tr>`;
  }
})();
</script>

</body>
</html>
