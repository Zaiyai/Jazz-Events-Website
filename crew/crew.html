<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crew</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="crew.css">

    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    
    <!-- FontAwesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Navigation Header -->
    <header>
        <div class="nav-container">
            <!-- Mobile Menu Button -->
            <button class="mobile-btn">
                <i class="fa-solid fa-bars"></i>
            </button>

            <!-- Navigation Links -->
            <nav class="nav-links">
                <a href="#banner-section">Home</a>
                <a href="#services-section">Services</a>
                <a href="#">Crew</a>
                <a href="#reviews-section">Reviews</a>
                <a href="#about">About Us</a>
                <a href="#">Contact</a>
            </nav>

            <!-- Search Bar -->
            <div class="search-wrapper">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input id="search-input" type="text" placeholder="Search Jazz Events...">
                <ul id="search-content"></ul>
            </div>
            
            <!-- Mobile Search Icon -->
             <button class="mobile-btn" style="display: block; margin-left: auto; display: none;">
                <i class="fa-solid fa-magnifying-glass" style="display: block; width: 24px; height: 24px;"></i>
            </button>
            <style>
                @media (min-width: 640px) { button.mobile-btn:last-child { display: none !important; } }
            </style>
        </div>
    </header>
</body>
</html>
