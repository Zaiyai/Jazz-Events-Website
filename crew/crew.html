<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crew</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="crew.css">

    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;500;700;800&display=swap" rel="stylesheet">

    <!-- FontAwesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Navigation Header -->
    <header>
        <div class="nav-container">
            <!-- Mobile Menu Button -->
            <button class="mobile-btn">
                <i class="fa-solid fa-bars"></i>
            </button>

            <!-- Navigation Links -->
            <nav class="nav-links">
                <a href="../home.html">Home</a>
                <a href="#services-section">Services</a>
                <a href="#">Crew</a>
                <a href="#reviews-section">Reviews</a>
                <a href="#about">About Us</a>
                <a href="#">Contact</a>
            </nav>

            <!-- Search Bar -->
            <div class="search-wrapper">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input id="search-input" type="text" placeholder="Search Jazz Events...">
                <ul id="search-content"></ul>
            </div>
            
            <!-- Mobile Search Icon -->
             <button class="mobile-btn" style="display: block; margin-left: auto; display: none;">
                <i class="fa-solid fa-magnifying-glass" style="display: block; width: 24px; height: 24px;"></i>
            </button>
            <style>
                @media (min-width: 640px) { button.mobile-btn:last-child { display: none !important; } }
            </style>
        </div>
    </header>

    <!-- Main Banner Hero Section -->
    <section id="banner-section" class="hero crew-hero">
        <div class="hero-content">
            <div class="logo-container">
                <img class="logo" alt="Jazz Events Logo" style="scale: 0.6; margin-top: 50px;">
            </div>

            <h2 class="section-title banner-title">Meet the people who make <span class="text-gold">your events</span> <span class="text-red">possible</span>:</h2>
        </div>
    </section>

    <!-- Crew Members -->
    <section id="crew-section">
        <div class="container">
            <h2 class="position-title">Founders:</h2>
            <div class="members-row center-container">
                <!-- Queen -->
                <div class="team-card">
                    <div class="member-img-container">
                        <img src="../assets/team/queen.jpg" alt="Debut">
                    </div>
                    <div class="member-content">
                        <h3 class="member-name">Queen Renalou Velasco</h3>
                        <p class="member-position">Co-Founder</p>
                    </div>
                </div>

                <!-- AJ -->
                <div class="team-card">
                    <div class="member-img-container">
                        <img src="../assets/team/queen.jpg" alt="Debut">
                    </div>
                    <div class="member-content">
                        <h3 class="member-name">AJ Velasco</h3>
                        <p class="member-position">Co-Founder</p>
                    </div>
                </div>
            </div>
        </div>
    </section>
    
    <script src="../scripts/main.js"></script>
</body>
</html>
